; MDT Pro - In-game plugin settings
; Edit this file to change keybinds and other options. Restart the game or go off/on duty for changes to take effect.

[MDTPro]
; Key to open the in-game MDT Pro menu (ALPR, game work mode, StopThePed citation handoff when pending, cloud sign-in, etc.). Use key names like F7, F8, F9, F10, etc.
SettingsMenuKey=F10
; CitationHandoffKey is deprecated (handoff is the first menu item when a citation is pending). If SettingsMenuKey is missing or not recognized, a leftover CitationHandoffKey value is still read as the menu key.
