; MDT Pro - In-game plugin settings
; Edit this file to change keybinds and other options. Restart the game or go off/on duty for changes to take effect.

[MDTPro]
; Key to open the in-game Settings menu (ALPR and other options). Use key names like F7, F8, F9, F10, etc.
SettingsMenuKey=F7
; Citation handoff (StopThePed path, no Policing Redefined). Press when close to the suspect after closing a citation in the MDT.
; Default F10. If you use LSPDFR Enhanced, set its Open Menu Key or this key so they differ (Enhanced often uses F10).
CitationHandoffKey=F10
