    <path d="M100 55 v26 M100 81 c-16 0-28 12-28 28 0 10 5 19 14 24 M100 81 c16 0 28 12 28 28 0 10-5 19-14 24 M86 133 h28 M100 133 v18"/>
    <circle cx="100" cy="62" r="3.5" fill="url(#gold)"/>
